name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ecom-frontend

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: 🔒 Frontend Security
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🔐 Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: 🛡️ SAST with Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
          generateSarif: true
        continue-on-error: true

  dependency-check:
    runs-on: ubuntu-latest
    name: 📦 NPM Dependencies
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 🔍 Audit dependencies
        run: cd frontend && npm audit --audit-level=moderate
        continue-on-error: true

      - name: 📋 Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./frontend
          format: json
          output-file: sbom-frontend.json
        continue-on-error: true

  build:
    needs: [security-scan, dependency-check]
    runs-on: ubuntu-latest
    name: 🔨 Build Frontend
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: cd frontend && npm install --frozen-lockfile

      - name: Run ESLint
        run: cd frontend && npm run lint
        continue-on-error: true

      - name: Build project
        run: cd frontend && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/dist

  container-scan:
    needs: build
    runs-on: ubuntu-latest
    name: 🐳 Container Scan
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v3

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: frontend-build
          path: frontend/dist

      - name: Build Docker image
        run: |
          docker build -f frontend/Dockerfile -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: 🔍 Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy to Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif

  quality-gate:
    needs: [build, container-scan]
    runs-on: ubuntu-latest
    name: ✅ Quality Gate
    steps:
      - name: Validate quality
        run: echo "Frontend quality gates passed!"
