name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: maryratiary/commerce-de-pierre-precieuse/ecom-frontend

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: 🔒 Frontend Security
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔐 Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: 🛡️ SAST with Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
          generateSarif: true
        continue-on-error: true

  dependency-check:
    runs-on: ubuntu-latest
    name: 📦 NPM Dependencies
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 🔍 Audit dependencies
        run: cd frontend && npm audit --audit-level=moderate
        continue-on-error: true

      - name: 📋 Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./frontend
          format: json
          output-file: sbom-frontend.json
        continue-on-error: true

  build:
    needs: [security-scan, dependency-check]
    runs-on: ubuntu-latest
    name: 🔨 Build Frontend
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: cd frontend && npm install --frozen-lockfile

      - name: Run ESLint
        run: cd frontend && npm run lint
        continue-on-error: true

      - name: Build project
        run: cd frontend && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

  container-scan:
    needs: build
    runs-on: ubuntu-latest
    name: 🐳 Container Scan
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔍 Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy to Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  quality-gate:
    needs: [build, container-scan]
    runs-on: ubuntu-latest
    name: ✅ Quality Gate
    steps:
      - name: Validate quality
        run: echo "✅ Frontend pipeline completed successfully!"
