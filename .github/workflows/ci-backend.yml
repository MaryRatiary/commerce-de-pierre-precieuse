name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ecom-api

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: 🔒 Security Analysis
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔐 Secret Scanning with Gitleaks
        uses: gitleaks/gitleaks-action@v4
        continue-on-error: true

      - name: 🛡️ SAST with Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/security-audit
            p/cwe-top-25
          generateSarif: true
        continue-on-error: true

  dependency-check:
    runs-on: ubuntu-latest
    name: 📦 Dependency Analysis
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run dependency-check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'E-Commerce-API'
          path: 'backend'
          format: 'SARIF'
          out: 'reports'
          args: >
            --enable-retired
            --exclude node_modules
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/dependency-check-report.sarif
          wait-for-processing: true

  build:
    needs: [security-scan, dependency-check]
    runs-on: ubuntu-latest
    name: 🔨 Build Backend
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/EcomApi.csproj

      - name: Build
        run: dotnet build backend/EcomApi.csproj --configuration Release --no-restore

      - name: 🧪 Run tests
        run: dotnet test backend/EcomApi.csproj --configuration Release --no-build --verbosity normal
        continue-on-error: true

      - name: Publish
        run: dotnet publish backend/EcomApi.csproj -c Release -o backend/publish

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/publish

  container-scan:
    needs: build
    runs-on: ubuntu-latest
    name: 🐳 Container Security Scan
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend/publish

      - name: Build Docker image
        run: |
          docker build -f backend/Dockerfile -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: 🔍 Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  quality-gate:
    needs: [build, container-scan]
    runs-on: ubuntu-latest
    name: ✅ Quality Gate

    steps:
      - name: Check build status
        run: echo "Quality gates passed successfully!"