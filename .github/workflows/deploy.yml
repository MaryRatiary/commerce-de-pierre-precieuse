name: Build & Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permet de déclencher manuellement

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ecom-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ecom-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: 🔨 Build & Push Images
    permissions:
      contents: read
      packages: write

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ========== BUILD BACKEND ==========
      - name: 📦 Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.title=ecom-api
            org.opencontainers.image.description=E-Commerce API
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ========== BUILD FRONTEND ==========
      - name: 📦 Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.title=ecom-frontend
            org.opencontainers.image.description=E-Commerce Frontend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: ✅ Images pushed to GHCR
        run: |
          echo "✅ Backend: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
          echo "✅ Frontend: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    name: 🚀 Deploy to Server
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: 📋 Create .env file on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'SSHEOF'
          mkdir -p ~/ecom-app
          cd ~/ecom-app
          
          cat > .env << 'ENVEOF'
          # Backend Configuration
          ASPNETCORE_ENVIRONMENT=Production
          ASPNETCORE_URLS=http://0.0.0.0:5000
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DB_HOST=postgres
          DB_PORT=5432
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          
          # Frontend Configuration
          VITE_API_URL=https://${{ secrets.DOMAIN_NAME }}/api
          VITE_ENV=production
          ENVEOF
          
          echo "✅ .env created"
          SSHEOF

      - name: 🔨 Deploy with docker-compose
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'SSHEOF'
          cd ~/ecom-app
          
          # Create docker-compose.yml if it doesn't exist
          cat > docker-compose.yml << 'COMPOSEEOF'
          version: '3.9'
          
          services:
            postgres:
              image: postgres:15-alpine
              container_name: ecom-postgres
              environment:
                POSTGRES_USER: ${DB_USER}
                POSTGRES_PASSWORD: ${DB_PASSWORD}
                POSTGRES_DB: ${DB_NAME}
              volumes:
                - postgres_data:/var/lib/postgresql/data
              ports:
                - "5432:5432"
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
                interval: 10s
                timeout: 5s
                retries: 5
              networks:
                - ecom-network
          
            backend:
              image: ghcr.io/${{ github.repository_owner }}/ecom-api:${{ github.sha }}
              container_name: ecom-api
              depends_on:
                postgres:
                  condition: service_healthy
              environment:
                ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
                ASPNETCORE_URLS: ${ASPNETCORE_URLS}
                JWT_SECRET: ${JWT_SECRET}
                ConnectionStrings__DefaultConnection: Host=postgres;Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};
              ports:
                - "5000:5000"
              healthcheck:
                test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s
              networks:
                - ecom-network
              restart: unless-stopped
          
            frontend:
              image: ghcr.io/${{ github.repository_owner }}/ecom-frontend:${{ github.sha }}
              container_name: ecom-frontend
              depends_on:
                - backend
              environment:
                VITE_API_URL: ${VITE_API_URL}
                VITE_ENV: ${VITE_ENV}
              ports:
                - "3000:80"
              healthcheck:
                test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
                interval: 30s
                timeout: 10s
                retries: 3
              networks:
                - ecom-network
              restart: unless-stopped
          
          volumes:
            postgres_data:
              driver: local
          
          networks:
            ecom-network:
              driver: bridge
          COMPOSEEOF
          
          # Login to GHCR
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull latest images
          docker-compose pull
          
          # Stop old containers
          docker-compose down || true
          
          # Start new containers
          docker-compose up -d
          
          # Wait for services
          sleep 10
          
          # Run database migrations
          docker-compose exec -T backend dotnet ef database update
          
          echo "✅ Deployment successful!"
          SSHEOF

      - name: ✅ Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'SSHEOF'
          cd ~/ecom-app
          
          echo "🐳 Running containers:"
          docker-compose ps
          
          echo ""
          echo "📊 Health checks:"
          docker-compose exec -T backend curl -s http://localhost:5000/health | head -20 || echo "Backend starting..."
          docker-compose exec -T frontend wget -O- -q http://localhost/ | head -20 || echo "Frontend starting..."
          
          echo ""
          echo "✅ Deployment verified!"
          SSHEOF

      - name: 📨 Slack Notification (Optional)
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*E-Commerce Deployment*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }

  rollback:
    runs-on: ubuntu-latest
    name: 🔄 Rollback (Manual)
    if: failure()

    steps:
      - name: 🔐 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: 🔄 Rollback to previous version
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'SSHEOF'
          cd ~/ecom-app
          
          echo "⚠️  Rolling back to previous version..."
          docker-compose down
          
          # You should have a backup image tag
          docker-compose up -d --no-build
          
          echo "✅ Rollback complete"
          SSHEOF
